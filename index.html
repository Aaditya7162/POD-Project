<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Health | Unified AI Healthcare Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/main.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
</head>
<body>
    <div id="login-screen" class="login-overlay">
        <!-- Global Theme Toggle (visible on login screen) -->
        <button id="global-theme-btn" class="login-theme-btn" title="Toggle dark/light mode">🌙</button>
        <div class="login-card">
            <div class="logo" style="margin-bottom: 24px; justify-content: center;">
                <div class="logo-icon"></div>
                <span>Nexus Health</span>
            </div>
            <h2 style="text-align: center; margin-bottom: 8px;">Welcome Back</h2>
            <p style="text-align: center; color: var(--text-muted); margin-bottom: 32px;">Select your portal to continue</p>
            
            <div class="login-options" id="login-options">
                <div class="login-tile" id="login-admin">
                    <div class="tile-icon">👨‍⚕️</div>
                    <div class="tile-label">Clinician / Admin</div>
                    <div class="tile-desc">Full EHR Suite & AI Analytics</div>
                </div>
                <div class="login-tile" id="login-patient">
                    <div class="tile-icon">👤</div>
                    <div class="tile-label">Patient Portal</div>
                    <div class="tile-desc">ABHA Records & Data Control</div>
                </div>
            </div>

            <div id="admin-login-form" class="login-form-container hidden">
                <div class="form-group">
                    <label>Official Email Address</label>
                    <input type="text" id="admin-login-userid" placeholder="e.g. dr.gupta@nexus.ai">
                </div>
                <div class="form-group">
                    <label>Access Password</label>
                    <input type="password" id="admin-login-password" placeholder="••••••••">
                </div>
                <button id="submit-admin-login" class="btn-primary" style="width: 100%; margin-top: 24px; padding: 16px;">Secure Access</button>
                <button class="back-to-roles" style="width: 100%; margin-top: 16px; background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 0.9rem;">← Choose a different portal</button>
            </div>

            <div id="patient-login-form" class="login-form-container hidden">
                <div class="form-group">
                    <label>ABHA ID / Mobile Number</label>
                    <input type="text" id="patient-login-userid" placeholder="e.g. arjun.sharma@abha.in">
                </div>
                <div class="form-group">
                    <label>Secure PIN</label>
                    <input type="password" id="patient-login-password" placeholder="••••••••">
                </div>
                <button id="submit-patient-login" class="btn-primary" style="width: 100%; margin-top: 24px; padding: 16px; background: var(--success); color: white;">Access My Health Records</button>
                <button class="back-to-roles" style="width: 100%; margin-top: 16px; background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 0.9rem;">← Choose a different portal</button>
            </div>
        </div>
    </div>

    <div id="app" class="app-container hidden">
        <!-- Sidebar Navigation -->
        <nav class="sidebar">
            <div class="logo">
                <div class="logo-icon"></div>
                <span>Nexus Health</span>
            </div>
            <ul class="nav-links">
                <li class="active admin-only" data-view="dashboard">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                    Dashboard
                </li>
                <li data-view="timeline">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                    History
                </li>
                <li class="admin-only" data-view="standardizer">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                    Data Center
                </li>
                <li class="admin-only" data-view="auth">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                    Prior Auth
                </li>
                <li class="admin-only" data-view="patients">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                    Patient List
                </li>
                <li data-view="patient-app">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect><line x1="12" y1="18" x2="12.01" y2="18"></line></svg>
                    <span id="patient-nav-label">Patient App</span>
                </li>
            </ul>
            <div class="sidebar-footer admin-only">
                <button id="break-glass-btn" class="glass-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
                    Break the Glass
                </button>
            </div>
        </nav>

        <!-- Main Content Area -->
        <main class="content">
            <header class="top-bar">
                <button id="sidebar-toggle" class="sidebar-toggle-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                </button>
                <div class="search-bar">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <input type="text" placeholder="Search patients, records, or labs...">
                </div>
                <div class="user-profile">
                    <div class="notifications">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
                    </div>
                    <button id="theme-toggle-btn" class="theme-toggle-btn" title="Toggle dark/light mode">🌙</button>
                    <div class="avatar" id="user-avatar">--</div>
                    <div style="display: flex; flex-direction: column;">
                        <span id="user-name" style="font-weight: 600; font-size: 0.9rem;">--</span>
                        <span id="user-role" style="font-size: 0.7rem; color: var(--text-muted);">--</span>
                    </div>
                    <button id="logout-btn" style="background: none; border: none; color: var(--danger); cursor: pointer; font-size: 0.8rem; font-weight: 700; margin-left: 12px;">LOGOUT</button>
                </div>
            </header>

            <div id="view-container" class="view-container">
                <!-- Views will be injected here -->
            </div>
        </main>

        <!-- Universal Components -->
        <div id="modal-container" class="modal-overlay hidden"></div>
        <div id="sidebar-overlay" class="sidebar-overlay"></div>
        <div id="toast-container" class="toast-container"></div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
